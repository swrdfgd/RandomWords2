<body>
<div class="container">

<header>
  <h1>Random Words</h1>

</header>

<button onclick="generate()">Generate</button>

<section class="words" id="words"></section>

<footer>

</footer>

</div>

<script>
/* ======================================================
   GLOBAL SITE LISTS (LOADED ONCE)
====================================================== */

let WIKTIONARY_SITES = [];
let WIKIPEDIA_SITES = [];

/* ======================================================
   SAFE FETCH
====================================================== */

function fetchWithTimeout(url, ms = 6000){
  return Promise.race([
    fetch(url),
    new Promise((_, reject) =>
      setTimeout(() => reject("timeout"), ms)
    )
  ]);
}

async function fetchJSON(url){
  const r = await fetchWithTimeout(url);
  return r.json();
}

/* ======================================================
   LOAD SUBDOMAINS ONCE (SITEMATRIX)
====================================================== */

async function loadWikimediaSites(){
  const data = await fetchJSON(
    "https://meta.wikimedia.org/w/api.php?action=sitematrix&format=json&origin=*"
  );

  const matrix = data.sitematrix;

  for(const key in matrix){
    if(key === "count") continue;

    const block = matrix[key];
    if(!block.site || !block.code) continue;

    const lang = block.code; // ← INI YANG BENAR

    block.site.forEach(site=>{
      if(site.closed || site.private) return;

      if(site.code === "wiktionary"){
        WIKTIONARY_SITES.push(lang);
      }

      if(site.code === "wiki"){
        WIKIPEDIA_SITES.push(lang);
      }
    });
  }
}

/* =========================================
   TITLE CLEANER CONFIG
========================================= */

/*
  Semua lowercase.
  Tambahkan sendiri jika menemukan prefix baru.
*/
const FORBIDDEN_PREFIXES = [

  // English
  "user",
  "template",
  "talk",
  "wikipedia",
  "wiktionary",
  "file",
  "category",
  "help",
  "portal",
  "module",
  "mediawiki",
  "special",
  "draft",
  "book",
  "media",
  "image",
  "User talk",
  "Template",
  "Talk",

  // Germanic / European variants
  "benotzer",      // Luxembourgish User
  "benutzer",      // German User
  "benutzerin",
  "diskussion",    // German Talk
  "vorlage",       // German Template

  // Romance variants
  "usuario",       // Spanish/Portuguese User
  "utilisateur",   // French User
  "modèle",        // French Template
  "categoria",     // Spanish/Italian Category

  // Slavic
  "участник",      // Russian User
  "шаблон",        // Russian Template

  // African / others
  "ithemplethi",   // Zulu Template
  "wiksyunaryo",   // Tagalog Wiktionary

  // Generic wiki namespace
  "project",
  "thread",
  "comment",
  
  "Dalībnieka diskusija",
  "सदस्य",
  "Kategorie",
  
];


/* =========================================
   TITLE CLEANER FUNCTION
========================================= */

function cleanTitle(title){

  if(!title) return title;

  let t = title.trim();

  /* =========================
     1️⃣ Remove blacklisted prefixes (recursive)
  ========================== */

  while(true){

    const colonIndex = t.indexOf(":");
    if(colonIndex === -1) break;

    const prefix = t.slice(0, colonIndex).trim().toLowerCase();

    if(FORBIDDEN_PREFIXES.includes(prefix)){
      t = t.slice(colonIndex + 1).trim();
    } else {
      break; // prefix bukan blacklist → stop
    }
  }

  /* =========================
     2️⃣ Remove trailing " wiki"
  ========================== */

  if(!/^wiki$/i.test(t)){
    t = t.replace(/\s+wiki$/i, "");
  }
  
  if(!/^Wiki$/i.test(t)){
    t = t.replace(/\s+Wiki$/i, "");
  }

  /* =========================
     3️⃣ Final trim & cleanup
  ========================== */

  t = t.trim();

  return t;
}


/* ======================================================
   WORD SOURCES
====================================================== */

async function randomFromWiktionary(){
  const lang = WIKTIONARY_SITES[
    Math.floor(Math.random() * WIKTIONARY_SITES.length)
  ];

  const data = await fetchJSON(
    `https://${lang}.wiktionary.org/w/api.php?action=query&list=random&rnlimit=1&format=json&origin=*`
  );

  return {
    word: cleanTitle(data.query.random[0].title),
    source: `Wiktionary (${lang})`,
	isFontGenerated: false
  };
}

async function randomFromWikipedia(){
  const lang = WIKIPEDIA_SITES[
    Math.floor(Math.random() * WIKIPEDIA_SITES.length)
  ];

  const data = await fetchJSON(
    `https://${lang}.wikipedia.org/w/api.php?action=query&list=random&rnlimit=1&format=json&origin=*`
  );

  return {
    word: cleanTitle(data.query.random[0].title),
    source: `Wikipedia (${lang})`,
	isFontGenerated: false
  };
}



/* =========================================
   RANDOM FANDOM VIA TXT
========================================= */

const FANDOM_FILE_COUNT = 3234;
const FANDOM_PATH = "fandom";

function randomFromFandom(){

  return new Promise((resolve, reject)=>{

    /* 1. file fandom acak */
    const fileIndex = Math.floor(Math.random() * FANDOM_FILE_COUNT) + 1;
    const fileUrl = `https://cdn.jsdelivr.net/gh/swrdfgd/RandomWords2/fandom/fandom_${fileIndex}.txt`;

    $.get(fileUrl)
      .done(txt => {

        /* 2. ambil baris acak */
        const lines = txt
          .split("\n")
          .map(l => l.trim())
          .filter(Boolean);

        if(!lines.length) return reject("empty fandom file");

        const line = lines[Math.floor(Math.random() * lines.length)];

        /* 3. ambil link setelah koma terakhir */
        const lastComma = line.lastIndexOf(",");
        if(lastComma === -1) return reject("invalid line");

        let wikiUrl = line.slice(lastComma + 1).trim();
        wikiUrl = wikiUrl.replace(/\/+$/, "");
		wikiUrl = wikiUrl.replace("http://", "https://");

        /* 4. ambil artikel acak */
        const api = `${wikiUrl}/api.php?origin=*&action=query&format=json&list=random&rnlimit=1&rnnamespace=0`;

        $.getJSON(api)
          .done(data=>{
            const title = data?.query?.random?.[0]?.title;
            if(!title) return reject("no article");

            resolve({
              word: cleanTitle(title),
              source: `Fandom (${wikiUrl.replace(/^https?:\/\//,"")})`,
			  isFontGenerated: false
            });
          })
          .fail(()=>reject("article api failed"));

      })
      .fail(()=>reject("fandom txt failed"));

  });
}



/* =========================================
   RANDOM FROM WORDLIST
========================================= */

const WORDLIST_FILE_COUNT = 424;
const MOREWORDS_FILE_COUNT = 300;
let fileIndex
let fileUrl

function randomFromWordlist(){

  return new Promise((resolve, reject)=>{

    /* 1. file wordlist acak */
	if (Math.random() < 0.5){
		fileIndex = Math.floor(Math.random() * WORDLIST_FILE_COUNT) + 1;
		fileUrl = `https://cdn.jsdelivr.net/gh/swrdfgd/RandomWords2/wordlist/wordlist_${fileIndex}.txt`;
	}
	else{
		fileIndex = Math.floor(Math.random() * MOREWORDS_FILE_COUNT) + 1;
		fileUrl = `https://cdn.jsdelivr.net/gh/swrdfgd/RandomWords2/morewords/items_${fileIndex}.txt`;		
	}

    $.get(fileUrl)
      .done(txt => {

        /* 2. ambil baris acak */
        const lines = txt
          .split("\n")
          .map(l => l.trim())
          .filter(Boolean);

        if(!lines.length) return reject("empty wordlist file");

        const line = lines[Math.floor(Math.random() * lines.length)];

		resolve({
              word: line,
              source: `wordlist ${fileIndex}`,
			  isFontGenerated: false
            });

  

      })
      .fail(()=>reject("wordlist txt failed"));

  });
}

/* ======================================================
   FALLBACK
====================================================== */

function fallbackWord(){
  const chars = "abcdefghijklmnopqrstuvwxyz";
  let len = Math.floor(Math.random()*8)+3;
  let w = "";
  for(let i=0;i<len;i++){
    w += chars[Math.floor(Math.random()*chars.length)];
  }
  return {
    word: w,
    source: "Fallback Generator"
  };
}

/* ======================================================
   SELECTOR (TRY PER STAGE)
====================================================== */

async function generateWord(){

  if(Math.random() < 0.5){
    try{ return await randomFromWiktionary(); }
    catch(e){ console.warn("Wiktionary failed"); }
  }

  if(Math.random() < 0.5){
    try{ return await randomFromWikipedia(); }
    catch(e){ console.warn("Wikipedia failed"); }
  }
	
  if(Math.random() < 0.5){
    try{ return await randomFromFandom(); }
    catch(e){ console.warn("Fandom failed"); }
  }
  
  if(Math.random() < 0.5){
    try{ return await randomFromWordlist(); }
    catch(e){ console.warn("Wordlist failed"); }
  }

	try{ return await randomWordFromFont();}
	catch(e){console.warn("Font engine failed"); }

  return fallbackWord();
}

/* ======================================================
   MAIN
====================================================== */

function randomCount(){
  return Math.floor(Math.random()*100)+1;
}

async function generate(){
  const box = document.getElementById("words");
  box.innerHTML = "";

  const count = randomCount();

  for(let i=0;i<count;i++){
    try{
		const d = await generateWord();

		const el = document.createElement("div");
		el.className = "word";
		el.textContent = d.word;
		applyChaosWordStyle(el);

		

		// 🔥 jika font-generated → pakai exact font
		if(d.isFontGenerated){
		  applyExactFont(el, d);
		}
		else{
		  
		  await applyRandomFont(el); // tetap pakai random font biasa
		}
		
		box.appendChild(el);

    }catch(e){
      i--;
    }
  }
}

/* ======================================================
   INIT (LOAD ONCE)
====================================================== */

(async()=>{
  try{
    await loadWikimediaSites();
  }catch(e){
    console.warn("Sitematrix failed — using fallback only");
  }
  generate();
})();
</script>
